# Deploy static site to cPanel via FTP
#
# Built with Next.js static export (output: "export") and uploaded to cPanel.
# Runs on every push to the deploy branch.
#
# Setup
# Before this workflow will work, add these secrets to your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   FTP_HOST         — Your cPanel FTP hostname (e.g. ftp.example.com or the server IP)
#   FTP_USERNAME     — Your cPanel FTP username
#   FTP_PASSWORD     — Your cPanel FTP password
#   FTP_SERVER_DIR   — Remote directory to deploy into
#                      Usually "/public_html" or "/public_html/motherindia"
#                      (without trailing slash)
#
# Example:
#   FTP_HOST:     ftp.motherindiatourtravels.com
#   FTP_USERNAME: motherind
#   FTP_PASSWORD: ••••••••••
#   FTP_SERVER_DIR: /public_html

name: Build & Deploy to cPanel

on:
  push:
    branches: [deploy]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Prevent overlapping deploys from racing each other on the same FTP target
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build static site & upload to cPanel
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      # Build static site (generate Prisma client → apply migrations → static export)
      # Next.js fetches all data from Supabase PostgreSQL at build time
      # to pre-render every page (home, packages listing, 55+ detail pages).
      - name: Build static site
        run: npm run build:static
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_MAPTILER_KEY: ${{ secrets.NEXT_PUBLIC_MAPTILER_KEY }}

      - name: Validate FTP secrets
        id: ftp-secrets
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=()
          [[ -z "$FTP_HOST" ]] && missing+=("FTP_HOST")
          [[ -z "$FTP_USERNAME" ]] && missing+=("FTP_USERNAME")
          [[ -z "$FTP_PASSWORD" ]] && missing+=("FTP_PASSWORD")
          [[ -z "$FTP_SERVER_DIR" ]] && missing+=("FTP_SERVER_DIR")
          if (( ${#missing[@]} > 0 )); then
            echo "::warning::Skipping FTP upload because required secrets are missing: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Restore the FTP-Deploy-Action state file from the last successful run so it
      # can diff against a known-good manifest instead of re-stat'ing the whole
      # remote tree from scratch on a blank runner every time.
      - name: Restore FTP deploy state
        if: steps.ftp-secrets.outputs.ready == 'true'
        uses: actions/cache@v4
        with:
          path: .ftp-deploy-sync-state.json
          key: ftp-state-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            ftp-state-${{ github.ref }}-

      # Deploy to cPanel via FTP
      # Uploads the entire out/ directory. The FTP server dir is expected
      # to be empty or a fresh deployment target.
      - name: Upload to cPanel
        if: steps.ftp-secrets.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@3a9c65ae0fc12ac924ccef8afc26941cc43aad0b # v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/
          state-name: .ftp-deploy-sync-state.json
          log-level: minimal
          # Only delete files in the root level of server-dir to keep
          # cPanel system files intact (.htaccess, etc.)
          exclude: |
            **/.htaccess
            **/.htpasswd
            **/cgi-bin/**

      - name: Save FTP deploy state
        if: always() && steps.ftp-secrets.outputs.ready == 'true'
        uses: actions/cache/save@v4
        with:
          path: .ftp-deploy-sync-state.json
          key: ftp-state-${{ github.ref }}-${{ github.run_id }}
