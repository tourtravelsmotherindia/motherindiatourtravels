name = "motherindiatourtravels-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://motherindiatourtravels.com"

[assets]
directory = "./public"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "motherindiatourtravels-assets"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Secrets — set via: npx wrangler secret put <KEY_NAME>
# SUPABASE_URL
# SUPABASE_SECRET_KEY
# BOOKING_SMTP_USER
# BOOKING_SMTP_PASS
# NOTIFY_SMTP_USER
# NOTIFY_SMTP_PASS
# SMTP_HOST
# SMTP_PORT
