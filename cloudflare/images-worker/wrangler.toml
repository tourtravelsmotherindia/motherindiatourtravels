name = "motherindiatourtravels-images"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGIN = "https://motherindiatourtravels.com"

[assets]
directory = "./public"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "motherindiatourtravels-assets"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
